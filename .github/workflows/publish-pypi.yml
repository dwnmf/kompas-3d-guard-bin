name: Publish wheel to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub release tag to publish, for example v0.6.2"
        required: true
        default: "v0.6.2"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish release wheel
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/kompas-3d-guard/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download wheel from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p dist
          gh release download "${{ steps.rel.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.whl" \
            --dir dist
          ls -lh dist

      - name: Check wheel metadata
        shell: bash
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
